{{- define "main" -}}
  <div class="container collection-single-page">
    <article class="collection-post">
      <div class="collection-back-link">
        <a href="/collections/">← back</a>
      </div>
      <div class="collection-post-title draggable">{{ .Title }}</div>
      <div class="collection-content-wrapper">
        {{- .Content -}}
      </div>
    </article>

    {{- partial "nav.html" . -}}
  </div>

  <!-- Collection Image Gallery with Custom Cursor -->
  <div id="collection-gallery" class="collection-gallery">
    <img id="collection-gallery-image" src="" alt="">
  </div>

  <!-- Custom Cursor for Gallery -->
  <div id="collection-cursor" class="collection-cursor">
    <div class="collection-cursor-inner">close</div>
  </div>

  <script type="module">
    import { gsap } from 'https://cdn.skypack.dev/gsap@3.12.2';

    (function() {
      const gallery = document.getElementById('collection-gallery');
      const galleryImg = document.getElementById('collection-gallery-image');
      const cursor = document.getElementById('collection-cursor');
      const collectionPost = document.querySelector('.collection-post');

      let isAnimating = false;
      let clickedImage = null;
      let originalRect = null;

      // === Draggable Elements ===
      const makeDraggable = (element) => {
        let isDragging = false;
        let startMousePos = { x: 0, y: 0 };
        let startTransform = { x: 0, y: 0 };
        let currentTransform = { x: 0, y: 0 };
        let hasDragged = false;
        const moveThreshold = 5; // Minimum pixels to move before considering it a drag

        const handleMouseDown = (e) => {
          e.preventDefault();

          // Reset drag state
          isDragging = true;
          hasDragged = false;

          // Store starting mouse position
          startMousePos = {
            x: e.clientX,
            y: e.clientY
          };

          // Store current transform values
          startTransform = { ...currentTransform };

          document.addEventListener('mousemove', handleMouseMove);
          document.addEventListener('mouseup', handleMouseUp);
        };

        const handleMouseMove = (e) => {
          if (!isDragging) return;

          // Calculate how far we've moved from start
          const deltaX = e.clientX - startMousePos.x;
          const deltaY = e.clientY - startMousePos.y;
          const moveDistance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);

          // Only mark as dragged if we've moved beyond threshold
          if (!hasDragged && moveDistance < moveThreshold) {
            return;
          }

          hasDragged = true;

          // Calculate new transform as start transform + delta
          currentTransform = {
            x: startTransform.x + deltaX,
            y: startTransform.y + deltaY
          };

          // Apply transform
          gsap.set(element, {
            x: currentTransform.x,
            y: currentTransform.y
          });
        };

        const handleMouseUp = () => {
          isDragging = false;
          document.removeEventListener('mousemove', handleMouseMove);
          document.removeEventListener('mouseup', handleMouseUp);

          // Don't reset hasDragged here - let it persist for click prevention
        };

        element.addEventListener('mousedown', handleMouseDown);

        // Return function to check if dragged (for click prevention)
        return () => hasDragged;
      };

      // === Initialize Draggable Elements ===
      const initializeDraggables = () => {
        const draggableChecks = new Map();

        // Collect all draggable elements
        const allElements = [];

        // Add title
        const title = collectionPost.querySelector('.collection-post-title');
        if (title) allElements.push(title);

        // Add content elements
        const contentWrapper = collectionPost.querySelector('.collection-content-wrapper');
        if (contentWrapper) {
          const contentElements = contentWrapper.querySelectorAll('p, h1, h2, h3, h4, h5, h6, img');
          contentElements.forEach(el => allElements.push(el));
        }

        // Make all elements draggable (they stay in their natural flexbox positions)
        allElements.forEach((element) => {
          draggableChecks.set(element, makeDraggable(element));
        });

        // Store for image click prevention
        window.draggableChecks = draggableChecks;
      };

      // Wait for content to load, then initialize
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initializeDraggables);
      } else {
        initializeDraggables();
      }

      // === Image Gallery with Animation ===
      const collectionImages = document.querySelectorAll('.collection-post img:not([src=""])');

      // Custom cursor tracking
      const updateCursor = (e) => {
        gsap.set(cursor, { x: e.clientX, y: e.clientY });
      };

      // Expand image animation
      const expandImage = async (img) => {
        if (isAnimating) return;
        isAnimating = true;

        clickedImage = img;

        // Get the current visual position of the image (including any transforms)
        originalRect = img.getBoundingClientRect();

        // Show gallery and hide original image
        gallery.classList.add('active');
        cursor.classList.add('active');
        document.body.style.overflow = 'hidden';
        document.body.style.cursor = 'none';

        // Calculate center position
        const centerX = window.innerWidth / 2;
        const centerY = window.innerHeight / 2;

        // Start position: at the clicked image's visual location
        const startX = originalRect.left + originalRect.width / 2;
        const startY = originalRect.top + originalRect.height / 2;

        // Position gallery image at original image's center using transforms (invisible initially)
        gsap.set(galleryImg, {
          position: 'fixed',
          top: '50%',
          left: '50%',
          x: startX - centerX,
          y: startY - centerY,
          xPercent: -50,
          yPercent: -50,
          width: originalRect.width,
          height: originalRect.height,
          maxWidth: originalRect.width,
          maxHeight: originalRect.height,
          opacity: 1
        });

        // Set gallery image source
        galleryImg.src = img.src;
        galleryImg.alt = img.alt || 'Collection image';

        // Wait for image to load before animating
        const imageLoadPromise = new Promise((resolve) => {
          if (galleryImg.complete) {
            resolve();
          } else {
            galleryImg.onload = () => resolve();
            galleryImg.onerror = () => resolve(); // Continue even if error
          }
        });

        await imageLoadPromise;

        // Calculate target dimensions for the expanded image
        const naturalWidth = galleryImg.naturalWidth;
        const naturalHeight = galleryImg.naturalHeight;
        const maxWidth = window.innerWidth * 0.9;
        const maxHeight = window.innerHeight * 0.9;

        // Calculate final size maintaining aspect ratio
        const aspectRatio = naturalWidth / naturalHeight;
        let targetWidth, targetHeight;

        if (naturalWidth / maxWidth > naturalHeight / maxHeight) {
          // Width is the limiting factor
          targetWidth = Math.min(naturalWidth, maxWidth);
          targetHeight = targetWidth / aspectRatio;
        } else {
          // Height is the limiting factor
          targetHeight = Math.min(naturalHeight, maxHeight);
          targetWidth = targetHeight * aspectRatio;
        }

        // Now animate with the loaded image
        const tl = gsap.timeline();

        // Fade in the image
        tl.to(galleryImg, {
          opacity: 1,
          duration: 0.2,
          ease: 'power3.out'
        });

        // Move to center
        tl.to(galleryImg, {
          x: 0,
          y: 0,
          duration: 0.7,
          ease: 'power3.inOut'
        }, '<');

        // Expand to full size with calculated dimensions
        tl.to(galleryImg, {
          width: targetWidth,
          height: targetHeight,
          maxWidth: maxWidth,
          maxHeight: maxHeight,
          duration: 0.5,
          ease: 'power3.inOut',
          onComplete: () => {
            isAnimating = false;
          }
        }, '<0.2'); // Start 0.2s into the previous animation
      };

      // Minimize image animation
      const minimizeImage = async () => {
        if (isAnimating || !clickedImage || !originalRect) return;
        isAnimating = true;

        // Calculate positions
        const centerX = window.innerWidth / 2;
        const centerY = window.innerHeight / 2;
        const startX = originalRect.left + originalRect.width / 2;
        const startY = originalRect.top + originalRect.height / 2;

        const tl = gsap.timeline();

        // Shrink to original size
        tl.to(galleryImg, {
          width: originalRect.width,
          height: originalRect.height,
          maxWidth: originalRect.width,
          maxHeight: originalRect.height,
          duration: 0.5,
          ease: 'power3.inOut'
        });

        // Move back to original position
        tl.to(galleryImg, {
          x: startX - centerX,
          y: startY - centerY,
          duration: 0.7,
          ease: 'power3.inOut'
        }, '<0.2'); // Start 0.2s into the previous animation

        // Fade out
        tl.to(galleryImg, {
          opacity: 1,
          duration: 0.2,
          ease: 'power3.in',
          onComplete: () => {
            gallery.classList.remove('active');
            cursor.classList.remove('active');
            document.body.style.overflow = '';
            document.body.style.cursor = '';
            galleryImg.src = '';
            clickedImage = null;
            originalRect = null;
            isAnimating = false;
          }
        });
      };

      // Add click listeners to collection images
      collectionImages.forEach(img => {
        img.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();

          // Check if this image was dragged
          const wasDragged = window.draggableChecks?.get(img)?.();
          if (wasDragged) return;

          if (img.src && !img.src.includes('data:image/svg+xml')) {
            expandImage(img);
          }
        });
      });

      // Close gallery function
      const closeGallery = () => {
        if (!isAnimating) {
          minimizeImage();
        }
      };

      // Gallery click to close
      gallery.addEventListener('click', closeGallery);

      // Update cursor position when gallery is active
      gallery.addEventListener('mousemove', updateCursor);

      // Close on Escape key
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && gallery.classList.contains('active')) {
          closeGallery();
        }
      });
    })();
  </script>
{{- end -}}
