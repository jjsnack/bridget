{{- define "main" -}}
  <div class="container collection-single-page">
    <article class="collection-post">
      <div class="collection-back-link">
        <a href="/collections/">← back</a>
      </div>
      <div class="collection-post-title draggable">{{ .Title }}</div>
      <div class="collection-content-wrapper">
        {{- .Content -}}
      </div>
    </article>

    {{- partial "nav.html" . -}}
  </div>

  <!-- Collection Image Gallery with Custom Cursor -->
  <div id="collection-gallery" class="collection-gallery">
    <img id="collection-gallery-image" src="" alt="">
  </div>

  <!-- Custom Cursor for Gallery -->
  <div id="collection-cursor" class="collection-cursor">
    <div class="collection-cursor-inner">close</div>
  </div>

  <script type="module">
    import { gsap } from 'https://cdn.skypack.dev/gsap@3.12.2';

    (function() {
      const gallery = document.getElementById('collection-gallery');
      const galleryImg = document.getElementById('collection-gallery-image');
      const cursor = document.getElementById('collection-cursor');
      const collectionPost = document.querySelector('.collection-post');

      let isAnimating = false;
      let clickedImage = null;
      let originalRect = null;

      // === Draggable Elements ===
      const makeDraggable = (element, initialX, initialY) => {
        let isDragging = false;
        let dragOffset = { x: 0, y: 0 };
        let hasDragged = false;
        let currentPosition = { x: initialX, y: initialY };

        // Set initial position
        gsap.set(element, { x: initialX, y: initialY });

        const handleMouseDown = (e) => {
          e.preventDefault();
          isDragging = true;
          hasDragged = false;

          // Calculate offset from mouse to element position
          dragOffset = {
            x: e.clientX - currentPosition.x,
            y: e.clientY - currentPosition.y
          };

          document.addEventListener('mousemove', handleMouseMove);
          document.addEventListener('mouseup', handleMouseUp);
        };

        const handleMouseMove = (e) => {
          if (!isDragging) return;

          hasDragged = true;

          // Calculate new position with viewport constraints
          const rect = element.getBoundingClientRect();
          const viewportWidth = window.innerWidth;
          const viewportHeight = window.innerHeight;

          let newX = e.clientX - dragOffset.x;
          let newY = e.clientY - dragOffset.y;

          // Constrain to viewport bounds (with some padding)
          const padding = 20;
          const maxX = viewportWidth - rect.width - padding;
          const maxY = viewportHeight - rect.height - padding;

          newX = Math.max(-padding, Math.min(newX, maxX));
          newY = Math.max(-padding, Math.min(newY, maxY));

          currentPosition = { x: newX, y: newY };

          // Use GSAP for smooth movement
          gsap.set(element, { x: newX, y: newY });
        };

        const handleMouseUp = () => {
          isDragging = false;
          document.removeEventListener('mousemove', handleMouseMove);
          document.removeEventListener('mouseup', handleMouseUp);

          // Return hasDragged status for click prevention
          setTimeout(() => { hasDragged = false; }, 10);
        };

        element.addEventListener('mousedown', handleMouseDown);

        // Return function to check if dragged (for click prevention)
        return () => hasDragged;
      };

      // === Left-Aligned Layout ===
      const applyNaturalLayout = () => {
        const draggableChecks = new Map();

        // Collect all elements in DOM order
        const allElements = [];

        // Add title first
        const title = collectionPost.querySelector('.collection-post-title');
        if (title) allElements.push(title);

        // Add content elements in order
        const contentWrapper = collectionPost.querySelector('.collection-content-wrapper');
        if (contentWrapper) {
          const contentElements = contentWrapper.querySelectorAll('p, h1, h2, h3, h4, h5, h6, img');
          contentElements.forEach(el => allElements.push(el));
        }

        // Layout parameters - simple left-aligned column
        const leftMargin = 100; // Left margin from viewport edge
        let currentY = 150; // Top padding
        const spacing = 150; // Fixed spacing between elements

        // Position elements vertically in left-aligned column
        allElements.forEach((element) => {
          // X position: fixed left margin
          const x = 0; // No horizontal offset needed, CSS handles left margin
          const y = currentY;

          // Make element draggable with calculated position
          draggableChecks.set(element, makeDraggable(element, x, y));

          // Get element height after positioning for accurate measurement
          const rect = element.getBoundingClientRect();
          const elementHeight = rect.height || 100;

          // Update Y for next element (element height + fixed spacing)
          currentY += elementHeight + spacing; // 150px spacing between elements
        });

        // Store for image click prevention
        window.draggableChecks = draggableChecks;
      };

      // Wait for content to load, then apply
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', applyNaturalLayout);
      } else {
        applyNaturalLayout();
      }

      // Reapply layout on window resize (debounced)
      let resizeTimeout;
      window.addEventListener('resize', () => {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(applyNaturalLayout, 300);
      });

      // === Image Gallery with Animation ===
      const collectionImages = document.querySelectorAll('.collection-post img:not([src=""])');

      // Custom cursor tracking
      const updateCursor = (e) => {
        gsap.set(cursor, { x: e.clientX, y: e.clientY });
      };

      // Expand image animation
      const expandImage = async (img) => {
        if (isAnimating) return;
        isAnimating = true;

        clickedImage = img;
        originalRect = img.getBoundingClientRect();

        // Set gallery image
        galleryImg.src = img.src;
        galleryImg.alt = img.alt || 'Collection image';

        // Position gallery image at original image location
        gsap.set(galleryImg, {
          position: 'fixed',
          top: originalRect.top,
          left: originalRect.left,
          width: originalRect.width,
          height: originalRect.height,
          opacity: 0
        });

        // Show gallery
        gallery.classList.add('active');
        cursor.classList.add('active');
        document.body.style.overflow = 'hidden';
        document.body.style.cursor = 'none';

        // Animate expansion
        const tl = gsap.timeline();

        // Fade in
        tl.to(galleryImg, {
          opacity: 1,
          duration: 0.3,
          ease: 'power3.out'
        });

        // Move to center and scale up
        tl.to(galleryImg, {
          top: '50%',
          left: '50%',
          xPercent: -50,
          yPercent: -50,
          width: 'auto',
          height: 'auto',
          maxWidth: '100vw',
          maxHeight: '100vh',
          duration: 0.7,
          ease: 'power3.inOut',
          onComplete: () => {
            isAnimating = false;
          }
        });
      };

      // Minimize image animation
      const minimizeImage = async () => {
        if (isAnimating || !clickedImage || !originalRect) return;
        isAnimating = true;

        const tl = gsap.timeline();

        // Move back to original position and size
        tl.to(galleryImg, {
          top: originalRect.top,
          left: originalRect.left,
          xPercent: 0,
          yPercent: 0,
          width: originalRect.width,
          height: originalRect.height,
          maxWidth: 'none',
          maxHeight: 'none',
          duration: 0.7,
          ease: 'power3.inOut'
        });

        // Fade out
        tl.to(galleryImg, {
          opacity: 0,
          duration: 0.3,
          ease: 'power3.in',
          onComplete: () => {
            gallery.classList.remove('active');
            cursor.classList.remove('active');
            document.body.style.overflow = '';
            document.body.style.cursor = '';
            galleryImg.src = '';
            clickedImage = null;
            originalRect = null;
            isAnimating = false;
          }
        });
      };

      // Add click listeners to collection images
      collectionImages.forEach(img => {
        img.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();

          // Check if this image was dragged
          const wasDragged = window.draggableChecks?.get(img)?.();
          if (wasDragged) return;

          if (img.src && !img.src.includes('data:image/svg+xml')) {
            expandImage(img);
          }
        });
      });

      // Close gallery function
      const closeGallery = () => {
        if (!isAnimating) {
          minimizeImage();
        }
      };

      // Gallery click to close
      gallery.addEventListener('click', closeGallery);

      // Update cursor position when gallery is active
      gallery.addEventListener('mousemove', updateCursor);

      // Close on Escape key
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && gallery.classList.contains('active')) {
          closeGallery();
        }
      });
    })();
  </script>
{{- end -}}
