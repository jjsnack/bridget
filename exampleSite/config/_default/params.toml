# --- REQUIRED -----------------------------------------------------------------

# description of the site (will be placed in meta)
description = "Bridget is a minimal Hugo theme designed for photographers/visual artists."

# resize options for dynamic resolution, please refer to https://gohugo.io/content-management/image-processing/#image-processing-options
# moResOpt: smaller variant for the mobile scatter view (displayed at ~60vw) —
# also the image preloaded for mobile LCP. Keep it <= loResOpt.
moResOpt = "640x webp Lanczos q60"
loResOpt = "800x webp Lanczos q60"
hiResOpt = "2500x webp Lanczos q75"

# auto-orient gallery images from EXIF orientation before resizing; only false disables it
autoOrient = true

# --- OPTIONAL -----------------------------------------------------------------

# whether to use favicon resource links
# generate these with https://realfavicongenerator.net
favicon = true
# modern SVG favicon to use in place of older style .png and .ico files
svgFavicon = "/dot.svg"
# fallback png favicon for unsupported browsers
svgFaviconFallback = "/dot.png"

# cloud image CDN (optional)
# When cdnBase is set AND building for production (hugo.IsProduction), gallery
# images are served from an on-the-fly image CDN instead of Hugo-processed local
# copies: {cdnBase}/{key}{cdnHiQuery|cdnLoQuery}. Leave cdnBase empty to always use
# the committed low-res copies (local dev + non-CDN deploys). Upload EXIF-stripped
# masters (see `pnpm images`) to {cdnBase}/{key}; key = content-relative image path,
# e.g. grid/e1.jpg.
cdnBase = ""
cdnHiQuery = "?w=2500&fm=webp&q=75"
cdnLoQuery = "?w=800&fm=webp&q=60"

# labels (text shown on the UI)
[labels]
next = "next"
prev = "prev"
close = "close"
threshold = "Threshold"
error = "page not found"
loading = "loading..."
skip = "Skip to content"

# site verification code for Google/Bing/Yandex/Pinterest/Baidu
[verification]
google = ""
bing = ""
yandex = ""
pinterest = ""
baidu = ""
so = ""
sogou = ""

# analytics config
[analytics]
enable = true
# Google Analytics
[analytics.google]
id = ""
# whether to anonymize IP
anonymizeIP = true
# Fathom Analytics
[analytics.fathom]
id = ""
# server url for your tracker if you're self hosting
server = ""
# Baidu Analytics
[analytics.baidu]
id = ""
# Umami Analytics
[analytics.umami]
# empty = no script. Configure with your OWN Umami instance to enable.
data_website_id = ""
src = ""
data_host_url = ""
data_domains = ""
# Plausible Analytics
[analytics.plausible]
data_domain = ""
src = ""
# Cloudflare Analytics
[analytics.cloudflare]
token = ""
# Splitbee Analytics
[analytics.splitbee]
enable = false
# no cookie mode
no_cookie = true
# respect the do not track setting of the browser
do_not_track = true
# token(optional), more info on https://splitbee.io/docs/embed-the-script
data_token = ""
